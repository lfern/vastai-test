
# Arquitectura:
#   [clawd] → ollama-proxy:11434 → vastai CLI → instancia GPU remota
#
# ollama-proxy actúa como Ollama ante cualquier cliente. Gestiona el ciclo de vida
# de Vast.ai de forma autónoma: lanza la instancia cuando llega una petición y la
# para tras N min de inactividad.

services:

  # Proxy Ollama-compatible que gestiona el ciclo de vida de Vast.ai.
  # Es el único servicio necesario ahora mismo.
  ollama-proxy:
    build: ./ollama-proxy
    image: ollama-test-proxy:latest
    container_name: ollama-proxy
    ports:
      - "11434:11434"
    volumes:
      - ./vastai-config:/root/.config/vastai   # API key de Vast.ai
    env_file: ./ollama-proxy.env               # editar sin necesidad de rebuild
    restart: unless-stopped

  # Chat UI. Descomentar cuando esté listo para usar.
  # clawd:
