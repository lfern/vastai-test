
# Arquitectura:
#   [clawd] → ollama-proxy:11434 → vastai CLI → instancia GPU remota
#
# ollama-proxy actúa como Ollama ante cualquier cliente. Gestiona el ciclo de vida
# de Vast.ai de forma autónoma: lanza la instancia cuando llega una petición y la
# para tras N min de inactividad.

services:

  # Proxy Ollama-compatible que gestiona el ciclo de vida de Vast.ai.
  # Es el único servicio necesario ahora mismo.
  ollama-proxy:
    build: ./ollama-proxy
    image: ollama-test-proxy:latest
    container_name: ollama-proxy
    ports:
      - "11434:11434"
    env_file: .env
    restart: unless-stopped

  clawd:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: clawd
    ports:
      - "18789:18789"
    volumes:
      - ./config:/home/node/.openclaw
      - ./workspace:/home/node/.openclaw/workspace
    environment:
      - OLLAMA_API_KEY=ollama-local
    depends_on:
      - ollama-proxy
    restart: unless-stopped

  # CLI de Vast.ai para uso manual desde la máquina host (scripts en vastai-scripts/).
  # No arranca por defecto. Uso: docker compose --profile vast run --rm vastai <cmd>
  # vastai:
  #   build: ./vastai
  #   image: ollama-test-vastai:latest
  #   container_name: vastai
  #   profiles:
  #     - vast
  #   volumes:
  #     - ./vastai-config:/root/.config/vastai
  #   working_dir: /workspace
